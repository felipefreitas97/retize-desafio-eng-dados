version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: retize-postgres
    environment:
      POSTGRES_USER: retize
      POSTGRES_PASSWORD: retize_password
      POSTGRES_DB: retize_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retize"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: