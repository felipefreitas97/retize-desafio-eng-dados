name: 'retize_dbt'
version: '1.0.0'
config-version: 2

profile: 'retize_dbt'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  retize_dbt:
    
    staging:
      +schema: staging
      +materialized: view

    marts:
      +schema: analytics
      +materialized: table
